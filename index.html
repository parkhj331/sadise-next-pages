<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사디세 NEXT — 자료 모음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --kakao-yellow: #FEE500;
    --kakao-brown: #3C1E1E;
    --accent-blue: #2563EB;
    --bg: #FAFAF8;
    --card-bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }
  .header {
    background: var(--kakao-brown);
    color: white;
    padding: 3rem 2rem;
    text-align: center;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }
  .header p {
    font-size: 1rem;
    opacity: 0.8;
  }
  .badge {
    display: inline-block;
    background: var(--kakao-yellow);
    color: var(--kakao-brown);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    margin-bottom: 1rem;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 1rem;
    transition: box-shadow 0.2s, border-color 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: var(--accent-blue);
  }
  .card h3 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
  }
  .card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .tag {
    display: inline-block;
    background: #EEF2FF;
    color: var(--accent-blue);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-top: 0.5rem;
  }
  .footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="badge">카카오임팩트</div>
    <h1>사디세 NEXT</h1>
    <p>사이좋은 디지털 세상 — AI 시민성 교육 프로젝트 자료 모음</p>
  </div>
  <div class="container">
    <a class="card" href="./pisa-2029/">
      <h3>PISA 2029 MAIL 방향성 분석</h3>
      <p>PISA 2029 프레임워크와 사디세 NEXT의 AI 시민성 교육 방향 연계 분석</p>
      <span class="tag">분석 자료</span>
    </a>
  </div>
  <div class="footer">
    &copy; 2026 사디세 NEXT
  </div>
</body>
</html>
